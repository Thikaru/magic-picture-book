<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法の書庫</title>
    <style>
        :root {
            --bg-dark: #080911;
            --page-bg: #faf6ee;
            --text-color: #2c3e50;
            --primary-glow: #ffcc00;
            --sparkle-gold: #ff9f43;
            --book-spine: #3a030b;
            --page-stack: #e2dacb;
            --cover-gold: rgba(236, 204, 104, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Georgia', 'Hiragino Mincho ProN', 'serif';
            background: radial-gradient(circle at 50% 30%, #1a2238 0%, var(--bg-dark) 70%);
            color: #fff;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* ローディング画面 */
        #loading-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at 50% 30%, #1a2238 0%, #080911 70%);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loading-inner { text-align: center; }
        .loading-book { font-size: 3.5rem; animation: bookFloat 2s ease-in-out infinite; }
        .loading-text { color: #ffde7d; letter-spacing: 4px; font-size: 0.9rem; margin-top: 20px; }
        .loading-error { color: #ff6b6b; font-size: 0.95rem; line-height: 1.7; }
        .loading-error button {
            margin-top: 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-family: inherit;
            font-size: 0.9rem; transition: background 0.2s;
        }
        .loading-error button:hover { background: rgba(255,255,255,0.2); }

        /* 全画面に広がる星空の背景（home / immersive 共通の土台） */
        #ambient-home {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        header {
            text-align: center;
            padding: 20px 20px 0 20px;
            z-index: 10;
        }
        header h1 {
            margin: 0; font-size: 1.8rem; color: var(--primary-glow);
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
        }

        /* ------------------------------------------
           1. ホーム画面
           ------------------------------------------ */
        #home-screen {
            position: relative; z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1; padding: 20px; text-align: center;
            opacity: 1; transition: opacity 0.8s ease;
            width: 100%; max-width: 900px;
        }
        #home-screen.fading-out { opacity: 0; pointer-events: none; }

        /* タイトルに金色のきらめきが流れる */
        #home-title {
            font-size: 2.4rem; letter-spacing: 3px; font-weight: bold;
            background: linear-gradient(100deg, #c9a14a 0%, #fff4cf 25%, #ffcc00 50%, #fff4cf 75%, #c9a14a 100%);
            background-size: 250% auto;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            animation: titleShimmer 6s linear infinite;
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.15);
        }
        @keyframes titleShimmer {
            to { background-position: 250% center; }
        }
        #home-subtitle {
            color: rgba(255,255,255,0.45); letter-spacing: 4px;
            font-size: 0.8rem; margin-top: 10px;
        }

        /* ふわりと浮く本のアイコン */
        .home-book-icon {
            font-size: 5.5rem; margin: 30px 0;
            filter: drop-shadow(0 14px 22px rgba(0,0,0,0.55)) drop-shadow(0 0 18px rgba(255,204,0,0.25));
            animation: bookFloat 5s ease-in-out infinite;
        }
        @keyframes bookFloat {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-16px) rotate(3deg); }
        }

        .open-btn {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, #ffde7d 0%, #eccc68 100%);
            color: #4a0000; border: none; padding: 16px 38px;
            font-size: 1.1rem; font-weight: bold; border-radius: 30px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .open-btn:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 0 35px var(--primary-glow); }
        .open-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        /* ボタンを横切る光のすじ */
        .open-btn::after {
            content: ""; position: absolute; top: 0; left: -60%;
            width: 40%; height: 100%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-20deg);
            animation: btnSheen 4.5s ease-in-out infinite;
        }
        @keyframes btnSheen {
            0%, 60% { left: -60%; }
            85%, 100% { left: 130%; }
        }

        /* 没入型全画面レイヤー */
        #immersive-book-layer {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 45%, #1c2335 0%, #04050a 75%);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
        }
        #immersive-book-layer.active { opacity: 1; pointer-events: auto; }

        /* 没入レイヤー内の浮遊粒子 */
        #ambient-book {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* ------------------------------------------
           2. 厚みのある立体本
           ------------------------------------------ */
        .book-wrapper {
            width: 92%; max-width: 1040px; height: 86vh; max-height: 760px;
            position: relative; z-index: 5;
            perspective: 2200px;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease;
            animation: bookBreathe 7s ease-in-out infinite;
        }
        /* 閉じている間、本がごくわずかに呼吸する */
        @keyframes bookBreathe {
            0%, 100% { transform: translateY(0) rotateX(0.5deg); }
            50% { transform: translateY(-8px) rotateX(-0.5deg); }
        }
        .book-wrapper.stage-opened { animation: none; }

        .book-wrapper.animating,
        .book-wrapper.animating * { pointer-events: none !important; }

        .book-wrapper.closing-animation {
            animation: shrinkAndFly 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards;
        }

        .book-body {
            position: absolute; inset: 0;
            background-color: var(--page-bg);
            border-radius: 4px 16px 16px 4px;
            box-shadow:
                0 25px 60px rgba(0,0,0,0.65),
                inset -3px 0 0 var(--page-stack),
                4px 0 0 var(--page-stack),
                8px 0 0 #d2c7b5,
                12px 0 0 #bdaba0,
                0 6px 0 var(--page-stack),
                0 12px 0 #bdaba0;
            z-index: 5; display: flex; flex-direction: column; overflow: hidden;
        }

        .book-cover {
            position: absolute; inset: 0;
            background:
                radial-gradient(circle at 50% 0%, rgba(255,222,125,0.12), transparent 60%),
                linear-gradient(135deg, #7a0016 0%, #3d0006 100%);
            border-radius: 6px 18px 18px 6px;
            border-left: 16px solid var(--book-spine);
            border-top: 3px solid var(--cover-gold);
            border-right: 3px solid var(--cover-gold);
            border-bottom: 3px solid var(--cover-gold);
            box-shadow:
                0 25px 50px rgba(0,0,0,0.8),
                inset -8px 0 15px rgba(0,0,0,0.5),
                inset 0 0 60px rgba(0,0,0,0.4),
                14px 0 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; z-index: 10; padding: 40px;
            transform-origin: left center;
            transition: transform 1.4s cubic-bezier(0.4, 0, 0.1, 1), opacity 0.8s ease;
            backface-visibility: hidden;
            overflow: hidden;
        }
        /* 表紙を斜めに横切る金箔のシマー */
        .book-cover::before {
            content: ""; position: absolute; top: -50%; left: -80%;
            width: 50%; height: 200%;
            background: linear-gradient(100deg, transparent, rgba(255,222,125,0.18), transparent);
            transform: rotate(8deg);
            animation: coverShimmer 6s ease-in-out infinite;
        }
        @keyframes coverShimmer {
            0%, 55% { left: -80%; }
            80%, 100% { left: 160%; }
        }
        /* 四隅の金の飾り罫 */
        .cover-frame {
            position: absolute; inset: 22px 22px 22px 30px;
            border: 1px solid rgba(236,204,104,0.35);
            border-radius: 4px; pointer-events: none;
        }
        .cover-frame::before, .cover-frame::after {
            content: ""; position: absolute; width: 18px; height: 18px;
            border: 2px solid rgba(255,222,125,0.6);
        }
        .cover-frame::before { top: -6px; left: -6px; border-right: none; border-bottom: none; }
        .cover-frame::after { bottom: -6px; right: -6px; border-left: none; border-top: none; }

        .cover-sparkle {
            font-size: 3.5rem; margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            animation: sparklePulse 3s ease-in-out infinite;
        }
        @keyframes sparklePulse {
            0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 6px rgba(255,222,125,0.5)); }
            50% { transform: scale(1.15) rotate(8deg); filter: drop-shadow(0 0 22px rgba(255,222,125,0.9)); }
        }

        .book-cover h2 {
            font-size: 2.2rem; color: #ffde7d; position: relative; z-index: 2;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6), 0 0 25px rgba(255,222,125,0.3);
            margin: 20px 0; text-align: center;
        }
        #immersive-cover-guide { position: relative; z-index: 2; }

        .stage-opened .book-cover {
            transform: rotateY(-158deg); opacity: 0; pointer-events: none;
        }

        /* ------------------------------------------
           3. 本を開いた瞬間の金色の光
           ------------------------------------------ */
        .page-glow-overlay {
            position: absolute; inset: 0;
            z-index: 99; pointer-events: none;
            background: radial-gradient(circle, #fff7da 8%, var(--primary-glow) 38%, var(--sparkle-gold) 68%, transparent 100%);
            opacity: 0;
            mix-blend-mode: screen;
        }
        .stage-opened .page-glow-overlay {
            animation: pageGoldGlow 1.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes pageGoldGlow {
            0% { opacity: 0; transform: scale(0.95); filter: blur(2px); }
            15% { opacity: 1; transform: scale(1); filter: blur(0px); }
            50% { opacity: 0.8; }
            100% { opacity: 0; transform: scale(1.03); filter: blur(10px); }
        }

        .stage-opened #immersive-page-0 .page-image-box,
        .stage-opened #immersive-page-0 .page-content-box {
            animation: firstPageFadeInImmersive 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes firstPageFadeInImmersive {
            0% { opacity: 0; filter: blur(8px); }
            30% { opacity: 0; filter: blur(8px); }
            65% { opacity: 0.4; filter: blur(4px); }
            100% { opacity: 1; filter: blur(0px); }
        }

        /* ------------------------------------------
           4. 絵本のページ
           ------------------------------------------ */
        .page-container { flex: 1; position: relative; height: 100%; }
        .page {
            position: absolute; inset: 0;
            background-color: var(--page-bg); display: flex; flex-direction: column;
            transform-origin: left center;
            transition: transform 0.85s cubic-bezier(0.55, 0, 0.35, 1), box-shadow 0.85s ease;
            backface-visibility: hidden; overflow: hidden;
        }
        .page.active { z-index: 2; transform: rotateY(0deg); box-shadow: 0 0 0 rgba(0,0,0,0); }
        /* めくる最中、紙の影が深くなり立体的に */
        .page.turned { z-index: 1; transform: rotateY(-180deg); box-shadow: -30px 0 40px rgba(0,0,0,0.3); }

        /* ページが手前に来た時に走る、やわらかな光のすじ */
        .page-sheen {
            position: absolute; inset: 0; z-index: 4; pointer-events: none;
            background: linear-gradient(105deg, transparent 35%, rgba(255,247,218,0.55) 50%, transparent 65%);
            opacity: 0; transform: translateX(-60%);
        }
        .page.active .page-sheen {
            animation: pageSheen 0.95s ease-out;
        }
        @keyframes pageSheen {
            0% { opacity: 0; transform: translateX(-60%); }
            40% { opacity: 1; }
            100% { opacity: 0; transform: translateX(60%); }
        }

        .page-image-box {
            flex: 2.1; width: 100%; min-height: 0; display: flex; justify-content: center; align-items: center;
            padding: 26px 26px 8px 26px;
        }
        .page-image-box img {
            max-width: 98%; max-height: 100%;
            object-fit: contain;
            border-radius: 4px; box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        /* 各ページが手前に来た時、絵がふわっと近づく */
        .page.active .page-image-box img { animation: imgRise 0.95s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes imgRise {
            0% { opacity: 0; transform: translateY(14px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .page-content-box {
            flex: 1; padding: 8px 50px 32px 50px; min-height: 0;
            display: flex; justify-content: center; align-items: center; text-align: center;
            overflow-y: auto;
        }
        .page-text { font-size: 1.25rem; line-height: 1.75; font-weight: 600; color: var(--text-color); margin: 0; }
        .page.active .page-text { animation: textRise 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.15s both; }
        @keyframes textRise {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .click-layer { position: absolute; top: 0; bottom: 0; width: 22%; z-index: 30; cursor: pointer; user-select: none; }
        .click-layer-left { left: 0; }
        .click-layer-right { right: 0; }

        /* ------------------------------------------
           5. コントロールパネル
           ------------------------------------------ */
        .global-controls-panel {
            /* position:fixed → absolute に変更（親が fixed inset:0 のため視覚的に同じ）
               iOS Safari の fixed 要素タップ不具合を回避する */
            position: absolute; bottom: 30px; right: 30px;
            bottom: max(30px, calc(30px + env(safe-area-inset-bottom)));
            display: flex; flex-direction: column; gap: 15px; align-items: flex-end;
            z-index: 2000; transition: opacity 0.8s ease;
        }
        #home-screen.fading-out ~ .global-controls-panel { opacity: 1; pointer-events: auto; }

        .audio-toggle-btn {
            background: rgba(13, 15, 30, 0.8); border: 2px solid #57606f; border-radius: 50%;
            width: 52px; height: 52px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); backdrop-filter: blur(5px);
            transition: all 0.3s; touch-action: manipulation;
        }
        .audio-toggle-btn:hover { transform: scale(1.08); border-color: var(--primary-glow); }
        .audio-toggle-btn.active {
            background: linear-gradient(135deg, #ffde7d 0%, #eccc68 100%);
            border-color: #ffffff; box-shadow: 0 0 18px var(--primary-glow);
            animation: audioPulse 2s ease-in-out infinite;
        }
        @keyframes audioPulse {
            0%, 100% { box-shadow: 0 0 12px var(--primary-glow); }
            50% { box-shadow: 0 0 26px var(--primary-glow); }
        }
        .audio-toggle-btn svg { width: 24px; height: 24px; fill: #ffffff; transition: fill 0.3s; }
        .audio-toggle-btn.active svg { fill: #4a0000; }

        .close-middle-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7); padding: 12px 24px; font-size: 0.9rem;
            font-weight: bold; border-radius: 20px; cursor: pointer;
            transition: all 0.3s; display: block; touch-action: manipulation;
            min-height: 44px;
        }
        .close-middle-btn:hover { background: rgba(255,255,255,0.2); border-color: #ffffff; color: #ffffff; }

        .finish-reading-btn {
            background: linear-gradient(135deg, #ffde7d 0%, #eccc68 100%);
            color: #4a0000; border: none; padding: 12px 28px; font-size: 0.95rem;
            font-weight: bold; border-radius: 25px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: none;
            transition: transform 0.2s, box-shadow 0.2s; touch-action: manipulation;
            min-height: 44px;
        }
        .finish-reading-btn:hover { transform: scale(1.05); box-shadow: 0 0 22px var(--primary-glow); }

        .book-wrapper.animating ~ .global-controls-panel { pointer-events: none !important; opacity: 0.6; }

        .memory-toast {
            position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #2f3542 0%, #1e212a 100%);
            border: 1px solid var(--primary-glow); color: var(--primary-glow);
            padding: 12px 30px; border-radius: 30px; font-weight: bold; font-size: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 25px rgba(255,204,0,0.25); z-index: 3000;
            display: flex; align-items: center; gap: 10px; opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .memory-toast.show { top: 40px; opacity: 1; }

        @keyframes shrinkAndFly {
            0% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
            40% { transform: scale(0.8) translateY(-20px) rotate(-4deg); opacity: 0.9; }
            100% { transform: scale(0.08) translateY(420px) rotate(8deg); opacity: 0; filter: blur(5px); }
        }

        @keyframes cardIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ------------------------------------------
           トップ画面の操作
           ------------------------------------------ */
        .home-actions { display: flex; flex-direction: column; gap: 14px; align-items: center; }
        .ghost-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,222,125,0.4);
            color: #ffde7d; padding: 14px 34px; font-size: 1.05rem; font-weight: bold;
            border-radius: 30px; cursor: pointer; letter-spacing: 1px;
            transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
        }
        .ghost-btn:hover { background: rgba(255,222,125,0.12); box-shadow: 0 0 22px rgba(255,204,0,0.25); transform: translateY(-2px); }
        .notice-btn {
            margin-top: 40px; background: none; border: none; color: rgba(255,255,255,0.4);
            font-size: 0.82rem; cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
            letter-spacing: 0.5px; transition: color 0.25s; font-family: inherit;
        }
        .notice-btn:hover { color: rgba(255,222,125,0.85); }

        /* ------------------------------------------
           書庫ページ
           ------------------------------------------ */
        #library-screen {
            position: fixed; inset: 0; z-index: 900;
            background: radial-gradient(circle at 50% 0%, #1a2236 0%, #05060c 72%);
            opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
            overflow-y: auto;
        }
        #library-screen.active { opacity: 1; pointer-events: auto; }
        .library-inner { max-width: 760px; margin: 0 auto; padding: 44px 22px 70px; }
        .lib-header { display: flex; align-items: center; gap: 16px; }
        .lib-header h2 { margin: 0; color: var(--primary-glow); font-size: 1.5rem; letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,204,0,0.2); }
        .lib-back {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
            color: #fff; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold;
            font-family: inherit; font-size: 0.9rem; transition: all 0.25s;
        }
        .lib-back:hover { background: rgba(255,255,255,0.16); border-color: var(--primary-glow); }
        .lib-count { margin-left: auto; color: rgba(255,255,255,0.5); font-size: 0.9rem; }
        .lib-lead { color: rgba(255,255,255,0.55); font-size: 0.92rem; line-height: 1.7; margin: 18px 0 0; }
        .lib-filters { display: flex; gap: 10px; margin: 24px 0 26px; flex-wrap: wrap; }
        .filter-tab {
            background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
            padding: 9px 24px; border-radius: 22px; cursor: pointer; font-weight: bold; font-size: 0.95rem;
            font-family: inherit; transition: all 0.25s;
        }
        .filter-tab:hover { border-color: var(--primary-glow); color: #fff; }
        .filter-tab.active {
            background: linear-gradient(135deg, #ffde7d, #eccc68); border-color: #fff; color: #4a0000;
            box-shadow: 0 0 14px rgba(255,204,0,0.3);
        }
        .lib-list { display: flex; flex-direction: column; gap: 16px; }
        .lib-card {
            display: flex; gap: 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; overflow: hidden; cursor: pointer; animation: cardIn 0.5s ease both;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
        }
        .lib-card:hover { transform: translateY(-3px); border-color: var(--primary-glow);
            box-shadow: 0 10px 26px rgba(0,0,0,0.45), 0 0 16px rgba(255,204,0,0.15); }
        .lib-thumb { width: 150px; flex: 0 0 150px; aspect-ratio: 16/9; overflow: hidden; }
        .lib-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .lib-info { flex: 1; padding: 14px 18px; display: flex; flex-direction: column; justify-content: center; gap: 9px; position: relative; }
        .lib-meta { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; flex-wrap: wrap; }
        .lib-date { color: rgba(255,255,255,0.55); letter-spacing: 1px; }
        .lib-genre { background: rgba(255,204,0,0.14); color: #ffde7d; padding: 2px 11px; border-radius: 10px; border: 1px solid rgba(255,222,125,0.3); }
        .lib-title { font-size: 1.2rem; font-weight: bold; color: #fff; padding-right: 60px; }
        .lib-status { position: absolute; top: 14px; right: 16px; font-size: 0.72rem; font-weight: bold; padding: 3px 11px; border-radius: 10px; }
        .lib-status.unread { background: rgba(120,160,255,0.18); color: #a9c2ff; border: 1px solid rgba(140,170,255,0.4); }
        .lib-status.read { background: rgba(120,255,170,0.13); color: #8df0b4; border: 1px solid rgba(120,230,160,0.4); }
        .lib-empty { text-align: center; color: rgba(255,255,255,0.45); padding: 60px 0; }
        @media (max-width: 560px) {
            .lib-card { flex-direction: column; }
            .lib-thumb { width: 100%; flex-basis: auto; }
            .lib-title { padding-right: 0; }
            .lib-status { position: static; align-self: flex-start; margin-top: 2px; }
        }

        /* ------------------------------------------
           AI注意ダイアログ
           ------------------------------------------ */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 4000; padding: 20px;
            background: rgba(4,5,10,0.78); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: linear-gradient(145deg, #241a14 0%, #15110d 100%);
            border: 1px solid rgba(255,222,125,0.35); border-radius: 18px;
            max-width: 440px; width: 100%; padding: 38px 34px; text-align: center;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6), 0 0 40px rgba(255,204,0,0.12);
            transform: scale(0.92); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }
        .modal-overlay.active .modal-card { transform: scale(1); }
        .modal-icon { font-size: 2.6rem; margin-bottom: 6px; filter: drop-shadow(0 0 14px rgba(255,222,125,0.5)); }
        .modal-card h3 { color: #ffde7d; margin: 6px 0 16px; font-size: 1.4rem; }
        .modal-card p { color: rgba(255,255,255,0.8); line-height: 1.95; font-size: 0.98rem; margin: 0 0 26px; }
        .modal-close {
            background: linear-gradient(135deg, #ffde7d, #eccc68); color: #4a0000; border: none;
            padding: 11px 32px; border-radius: 24px; font-weight: bold; font-size: 0.95rem;
            cursor: pointer; font-family: inherit; transition: transform 0.2s;
        }
        .modal-close:hover { transform: scale(1.05); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; }
        }

        /* ------------------------------------------
           スマホ対応
           ------------------------------------------ */
        @media (max-width: 640px) {
            .book-wrapper {
                width: 100%;
                height: 78vh;
            }
            .global-controls-panel {
                bottom: max(14px, env(safe-area-inset-bottom));
                right: 10px;

            .close-middle-btn,
            .finish-reading-btn {

            .home-book-icon { font-size: 4rem; margin: 18px 0; }
            #home-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- ローディング画面（データ取得中に表示） -->
    <div id="loading-screen">
        <div class="loading-inner">
            <div class="loading-book">📖</div>
            <p class="loading-text">物語を読み込み中…</p>
        </div>
    </div>

    <canvas id="ambient-home"></canvas>

    <div class="memory-toast" id="memory-toast">
        <span>✨</span> 物語を読み終えました。「読破」に記録しました
    </div>

    <div id="home-screen">
        <h1 id="home-title">魔法の書庫</h1>
        <div id="home-subtitle">THE LIBRARY OF MAGIC TALES</div>
        <div class="home-book-icon">📖</div>
        <div class="home-actions">
            <button class="open-btn" id="home-read-btn">
                今日の本を読む
            </button>
            <button class="ghost-btn" onclick="openLibrary()">📚 書庫を訪ねる</button>
        </div>
        <button class="notice-btn" onclick="openAiModal()">この絵本について</button>
    </div>

    <!-- 書庫ページ -->
    <div id="library-screen">
        <div class="library-inner">
            <header class="lib-header">
                <button class="lib-back" onclick="closeLibrary()">← もどる</button>
                <h2>📚 魔法の書庫</h2>
                <span class="lib-count" id="lib-count"></span>
            </header>
            <p class="lib-lead">これまでに綴られた物語たち。まだ読んでいない物語も、いつでも開くことができます。</p>
            <div class="lib-filters">
                <button class="filter-tab active" onclick="setFilter('all', this)">すべて</button>
                <button class="filter-tab" onclick="setFilter('unread', this)">未読</button>
                <button class="filter-tab" onclick="setFilter('read', this)">読破</button>
            </div>
            <div class="lib-list" id="lib-list"></div>
        </div>
    </div>

    <!-- AI注意ダイアログ -->
    <div id="ai-modal" class="modal-overlay" onclick="closeAiModalBg(event)">
        <div class="modal-card">
            <div class="modal-icon">✨</div>
            <h3>この絵本について</h3>
            <p>このサイトで公開されている絵本の文章と挿絵は、すべてAIによって自動生成されたものです。実在の人物・団体・出来事とは関係ありません。生成された物語のひとときを、どうぞお楽しみください。</p>
            <button class="modal-close" onclick="closeAiModal()">とじる</button>
        </div>
    </div>

    <div id="immersive-book-layer">
        <canvas id="ambient-book"></canvas>

        <div class="book-wrapper" id="story-stage">

            <div class="book-cover" id="book-cover" onclick="openImmersiveBook()">
                <div class="cover-frame"></div>
                <div class="cover-sparkle">✨</div>
                <h2 id="immersive-cover-title">タイトル</h2>
                <p id="immersive-cover-guide" style="color:#ffde7d; font-size:0.95rem; letter-spacing: 3px; margin-top:30px;">
                    【 タップして物語の扉を開く 】
                </p>
            </div>

            <div class="book-body">
                <div class="page-glow-overlay"></div>

                <div class="click-layer click-layer-left" id="click-left" onclick="prevPage()"></div>
                <div class="click-layer click-layer-right" id="click-right" onclick="nextPage()"></div>

                <div class="page-container" id="pages-wrapper"></div>
            </div>
        </div>

        <div class="global-controls-panel">
            <button class="audio-toggle-btn" id="audio-toggle" onclick="toggleAudio()" title="読み聞かせ（デフォルトOFF）">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <button class="close-middle-btn" id="close-middle-btn" onclick="closeBookInMiddle()" title="途中で閉じる">
                物語を閉じる
            </button>
            <button class="finish-reading-btn" id="finish-btn" onclick="closeAndSaveStory()">
                読み終えて本を閉じる
            </button>
        </div>
    </div>

    <script>
        /* ============================================================
           Supabase 設定（デプロイ時にGitHub Actionsが値を注入）
           ============================================================ */
        const SUPABASE_URL = 'https://lvvcpazeczetawstddrv.supabase.co';
        const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_eQXhJoYC0_AngShVkSMesg_Uy7VyEIy';

        /* ============================================================
           浮遊する金色の粒子と星の演出エンジン
           ============================================================ */
        function createParticleField(canvas) {
            const ctx = canvas.getContext("2d");
            let w = 0, h = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
            let particles = [], bursts = [], running = false, raf = null;

            function resize() {
                const rect = canvas.getBoundingClientRect();
                w = Math.round(rect.width) || window.innerWidth;
                h = Math.round(rect.height) || window.innerHeight;
                canvas.width = w * dpr; canvas.height = h * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            function makeParticle() {
                const isStar = Math.random() < 0.35;
                return {
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: isStar ? 0.6 + Math.random() * 1.2 : 1 + Math.random() * 2.4,
                    vy: isStar ? -0.05 - Math.random() * 0.1 : -0.15 - Math.random() * 0.35,
                    vx: (Math.random() - 0.5) * 0.25,
                    sway: Math.random() * Math.PI * 2,
                    swaySpeed: 0.005 + Math.random() * 0.015,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: 0.02 + Math.random() * 0.04,
                    base: 0.25 + Math.random() * 0.5,
                    star: isStar
                };
            }

            function seed(count) {
                particles = [];
                for (let i = 0; i < count; i++) particles.push(makeParticle());
            }

            function draw() {
                ctx.clearRect(0, 0, w, h);
                ctx.globalCompositeOperation = "lighter";

                for (const p of particles) {
                    p.sway += p.swaySpeed;
                    p.twinkle += p.twinkleSpeed;
                    p.x += p.vx + Math.sin(p.sway) * 0.3;
                    p.y += p.vy;
                    if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
                    if (p.x < -10) p.x = w + 10;
                    if (p.x > w + 10) p.x = -10;

                    const alpha = p.base * (0.55 + 0.45 * Math.sin(p.twinkle));
                    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
                    g.addColorStop(0, `rgba(255, 240, 190, ${alpha})`);
                    g.addColorStop(0.4, `rgba(255, 204, 0, ${alpha * 0.5})`);
                    g.addColorStop(1, "rgba(255, 159, 67, 0)");
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 本を開いた瞬間に弾ける光の粒
                for (let i = bursts.length - 1; i >= 0; i--) {
                    const b = bursts[i];
                    b.x += b.vx; b.y += b.vy;
                    b.vy += 0.02; b.vx *= 0.98; b.vy *= 0.98;
                    b.life -= 0.012;
                    if (b.life <= 0) { bursts.splice(i, 1); continue; }
                    const a = b.life;
                    const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 4);
                    g.addColorStop(0, `rgba(255, 247, 218, ${a})`);
                    g.addColorStop(0.5, `rgba(255, 204, 0, ${a * 0.6})`);
                    g.addColorStop(1, "rgba(255, 159, 67, 0)");
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r * 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.globalCompositeOperation = "source-over";
                raf = requestAnimationFrame(draw);
            }

            let lastCount = 50;
            function start(count) {
                lastCount = count || 50;
                resize();
                seed(lastCount);
                if (!running) { running = true; draw(); }
            }
            function stop() {
                running = false;
                if (raf) cancelAnimationFrame(raf);
                ctx.clearRect(0, 0, w, h);
            }
            function burst(cx, cy, n) {
                for (let i = 0; i < (n || 60); i++) {
                    const ang = Math.random() * Math.PI * 2;
                    const speed = 1.5 + Math.random() * 5;
                    bursts.push({
                        x: cx, y: cy,
                        vx: Math.cos(ang) * speed,
                        vy: Math.sin(ang) * speed,
                        r: 0.8 + Math.random() * 2,
                        life: 0.7 + Math.random() * 0.5
                    });
                }
            }

            window.addEventListener("resize", () => { if (running) { resize(); seed(lastCount); } });
            return { start, stop, burst, get size() { return { w, h }; } };
        }

        const homeField = createParticleField(document.getElementById("ambient-home"));
        const bookField = createParticleField(document.getElementById("ambient-book"));
        requestAnimationFrame(() => requestAnimationFrame(() => homeField.start(40)));

        /* ============================================================
           絵本データ（Supabaseから取得）
           ============================================================ */
        let storiesData = {};
        let latestStoryKey = '';
        let currentStoryKey = '';
        let activePageIndex = 0;
        let isAudioEnabled = false;
        let speechSynth = window.speechSynthesis;
        let speechUtterance = null;
        let humanVoice = null;
        let iosSpeechKeepAlive = null;
        let readStories = new Set();
        let returnTo = 'home';
        let libraryFilter = 'all';

        async function fetchStories() {
            const res = await fetch(
                `${SUPABASE_URL}/rest/v1/stories?select=date,title,genre,pages&order=date.desc`,
                {
                    headers: {
                        'apikey': SUPABASE_PUBLISHABLE_KEY,
                        'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
                    }
                }
            );
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        async function initApp() {
            try {
                const stories = await fetchStories();
                stories.forEach(s => {
                    storiesData[s.date] = { title: s.title, genre: s.genre, pages: s.pages };
                });

                const readBtn = document.getElementById('home-read-btn');
                if (stories.length > 0) {
                    latestStoryKey = stories[0].date;
                    readBtn.textContent = `今日の本を読む：「${storiesData[latestStoryKey].title}」`;
                    readBtn.onclick = () => enterImmersiveView(latestStoryKey, 'home');
                } else {
                    readBtn.textContent = 'まだ物語がありません';
                    readBtn.disabled = true;
                }

                const ls = document.getElementById('loading-screen');
                ls.classList.add('hidden');
                setTimeout(() => { ls.style.display = 'none'; }, 700);
            } catch (err) {
                console.error('Failed to load stories:', err);
                const ls = document.getElementById('loading-screen');
                ls.querySelector('.loading-inner').innerHTML = `
                    <div class="loading-error">
                        <p>物語の読み込みに失敗しました。<br>しばらくしてから再読み込みしてください。</p>
                        <button onclick="location.reload()">再読み込み</button>
                    </div>`;
            }
        }

        initApp();

        /* ----- 音声 ----- */
        function loadBestJapaneseVoice() {
            const voices = speechSynth.getVoices();
            if (voices.length === 0) return;
            humanVoice = voices.find(v => v.lang === 'ja-JP' && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Microsoft')))
                         || voices.find(v => v.lang === 'ja-JP')
                         || voices.find(v => v.lang.startsWith('ja'));
        }
        // iOS Safari は onvoiceschanged が発火しないことがあるためポーリングで待機
        function loadVoicesWithRetry(attempt) {
            const voices = speechSynth.getVoices();
            if (voices.length > 0) {
                loadBestJapaneseVoice();
            } else if (attempt < 20) {
                setTimeout(() => loadVoicesWithRetry(attempt + 1), 250);
            }
        }
        loadVoicesWithRetry(0);
        if (speechSynth.onvoiceschanged !== undefined) {
            speechSynth.onvoiceschanged = loadBestJapaneseVoice;
        }

        /* ----- 日付フォーマット ----- */
        function formatDate(key) {
            const [y, m, d] = key.split('-');
            return `${y}年${parseInt(m, 10)}月${parseInt(d, 10)}日`;
        }

        /* ----- 書庫ページ ----- */
        function openLibrary() {
            renderLibrary();
            document.getElementById("library-screen").classList.add("active");
        }
        function closeLibrary() {
            document.getElementById("library-screen").classList.remove("active");
        }
        function setFilter(f, btn) {
            libraryFilter = f;
            document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
            btn.classList.add("active");
            renderLibrary();
        }
        function renderLibrary() {
            const list = document.getElementById("lib-list");
            list.innerHTML = "";
            const keys = Object.keys(storiesData).sort().reverse();
            let shown = 0;
            keys.forEach(key => {
                const story = storiesData[key];
                const isRead = readStories.has(key);
                if (libraryFilter === "unread" && isRead) return;
                if (libraryFilter === "read" && !isRead) return;
                shown++;
                const card = document.createElement("div");
                card.className = "lib-card";
                card.onclick = () => enterImmersiveView(key, "library");
                card.innerHTML = `
                    <div class="lib-thumb"><img src="${story.pages[0].img}" alt=""></div>
                    <div class="lib-info">
                        <div class="lib-meta">
                            <span class="lib-date">${formatDate(key)}</span>
                            <span class="lib-genre">${story.genre || "ものがたり"}</span>
                        </div>
                        <div class="lib-title">${story.title}</div>
                        <span class="lib-status ${isRead ? 'read' : 'unread'}">${isRead ? '読破' : '未読'}</span>
                    </div>`;
                list.appendChild(card);
            });
            document.getElementById("lib-count").textContent = `${shown}冊`;
            if (shown === 0) {
                list.innerHTML = `<div class="lib-empty">この条件の物語はまだありません。</div>`;
            }
        }

        /* ----- AI注意ダイアログ ----- */
        function openAiModal() { document.getElementById("ai-modal").classList.add("active"); }
        function closeAiModal() { document.getElementById("ai-modal").classList.remove("active"); }
        function closeAiModalBg(e) { if (e.target.id === "ai-modal") closeAiModal(); }

        function enterImmersiveView(key, from) {
            currentStoryKey = key;
            returnTo = from || 'home';
            if (returnTo === 'home') {
                document.getElementById("home-screen").classList.add("fading-out");
            }

            setTimeout(() => {
                const layer = document.getElementById("immersive-book-layer");
                layer.classList.add("active");
                bookField.start(55);

                const stage = document.getElementById("story-stage");
                stage.className = "book-wrapper";

                setupStory(currentStoryKey);
            }, 800);
        }

        function openImmersiveBook() {
            const bookStage = document.getElementById("story-stage");
            bookStage.classList.add("stage-opened", "animating");

            const size = bookField.size;
            bookField.burst(size.w / 2, size.h / 2, 70);

            setTimeout(() => {
                bookStage.classList.remove("animating");
                if (isAudioEnabled) playVoice();
            }, 1000);
        }

        function handlePageVoice() {
            if (isAudioEnabled) {
                setTimeout(() => { playVoice(); }, 400);
            } else {
                stopVoice();
            }
        }

        function toggleAudio() {
            const btn = document.getElementById("audio-toggle");
            isAudioEnabled = !isAudioEnabled;
            if (isAudioEnabled) { btn.classList.add("active"); playVoice(); }
            else { btn.classList.remove("active"); stopVoice(); }
        }

        function closeAndSaveStory() {
            stopVoice();
            const stage = document.getElementById("story-stage");
            stage.classList.remove("stage-opened");

            const isFirstTime = !readStories.has(currentStoryKey);

            if (isFirstTime) {
                readStories.add(currentStoryKey);
                setTimeout(() => { stage.classList.add("closing-animation"); }, 1400);
                setTimeout(() => { backToOrigin(true); }, 2500);
            } else {
                setTimeout(() => { backToOrigin(false); }, 1400);
            }
        }

        function closeBookInMiddle() {
            stopVoice();
            backToOrigin(false);
        }

        function backToOrigin(withToast) {
            document.getElementById("immersive-book-layer").classList.remove("active");
            bookField.stop();

            if (returnTo === 'library') {
                renderLibrary();
                document.getElementById("library-screen").classList.add("active");
            } else {
                document.getElementById("home-screen").classList.remove("fading-out");
            }

            if (withToast) {
                const toast = document.getElementById("memory-toast");
                toast.classList.add("show");
                setTimeout(() => { toast.classList.remove("show"); }, 3500);
            }
        }

        function setupStory(key) {
            activePageIndex = 0;
            const story = storiesData[key];
            const coverTitle = document.getElementById("immersive-cover-title");
            const coverDiv = document.getElementById("book-cover");
            const coverGuide = document.getElementById("immersive-cover-guide");

            const isRead = readStories.has(key);
            coverTitle.textContent = story.title;
            coverDiv.className = "book-cover";
            coverGuide.textContent = isRead ? "【 タップして物語をもう一度読む 】" : "【 タップして物語の扉を開く 】";

            const wrapper = document.getElementById("pages-wrapper");
            wrapper.innerHTML = "";

            story.pages.forEach((page, index) => {
                const pageEl = document.createElement("div");
                pageEl.className = `page ${index === 0 ? 'active' : ''}`;
                pageEl.id = `immersive-page-${index}`;
                pageEl.style.zIndex = story.pages.length - index;
                pageEl.innerHTML = `
                    <div class="page-sheen"></div>
                    <div class="page-image-box">
                        <img src="${page.img}" alt="scene">
                    </div>
                    <div class="page-content-box">
                        <p class="page-text">${page.text}</p>
                    </div>
                `;
                wrapper.appendChild(pageEl);
            });
            updateButtonVisibility();
        }

        function updateButtonVisibility() {
            const story = storiesData[currentStoryKey];
            const closeMiddleBtn = document.getElementById("close-middle-btn");
            const finishBtn = document.getElementById("finish-btn");
            if (activePageIndex === story.pages.length - 1) {
                closeMiddleBtn.style.display = "none";
                finishBtn.style.display = "block";
            } else {
                closeMiddleBtn.style.display = "block";
                finishBtn.style.display = "none";
            }
        }

        function nextPage() {
            const story = storiesData[currentStoryKey];
            if (activePageIndex < story.pages.length - 1) {
                const currentPage = document.getElementById(`immersive-page-${activePageIndex}`);
                currentPage.classList.remove("active");
                currentPage.classList.add("turned");

                activePageIndex++;
                const np = document.getElementById(`immersive-page-${activePageIndex}`);
                np.classList.add("active");

                handlePageVoice();
                updateButtonVisibility();
            }
        }

        function prevPage() {
            if (activePageIndex > 0) {
                const currentPage = document.getElementById(`immersive-page-${activePageIndex}`);
                currentPage.classList.remove("active");

                activePageIndex--;
                const pp = document.getElementById(`immersive-page-${activePageIndex}`);
                pp.classList.remove("turned");
                pp.classList.add("active");

                handlePageVoice();
                updateButtonVisibility();
            }
        }

        function playVoice() {
            stopVoice();
            if (!humanVoice) loadBestJapaneseVoice();
            if (!currentStoryKey || !storiesData[currentStoryKey]) return;
            const story = storiesData[currentStoryKey];
            const currentText = story.pages[activePageIndex].text;
            speechUtterance = new SpeechSynthesisUtterance(currentText);
            if (humanVoice) speechUtterance.voice = humanVoice;
            speechUtterance.lang = 'ja-JP';
            speechUtterance.rate = 0.92;
            speechUtterance.pitch = 1.05;
            // iOS Safari バグ対策: 約15秒で音声が停止するため定期的に resume する
            iosSpeechKeepAlive = setInterval(() => {
                if (speechSynth.speaking) { speechSynth.pause(); speechSynth.resume(); }
            }, 12000);
            speechSynth.speak(speechUtterance);
        }

        function stopVoice() {
            if (iosSpeechKeepAlive) { clearInterval(iosSpeechKeepAlive); iosSpeechKeepAlive = null; }
            if (speechSynth.speaking) speechSynth.cancel();
        }
    </script>
</body>
</html>
